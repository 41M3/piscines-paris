name: Mettre à jour les tarifs

# Réexécute le scraper paris.fr et commite data/tarifs.json s'il a changé.
# Le commit déclenche ensuite le workflow de déploiement.

on:
  schedule:
    - cron: '17 5 * * 1' # tous les lundis à 05h17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scraper les tarifs
        run: node scripts/scrape-tarifs.mjs

      - name: Commit si modifié
        run: |
          if [[ -n "$(git status --porcelain data/tarifs.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/tarifs.json
            git commit -m "chore: mise à jour des tarifs des piscines"
            git push
          else
            echo "Aucun changement de tarifs."
          fi
